%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/mediatek,mt6351-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MT6351 Regulator from MediaTek Integrated

maintainers:
  - Ben Grisdale <bengris32@protonmail.ch>

description: |
  The MT6351 PMIC provides 9 BUCK and 30 LDO (Low Dropout) regulators
  and nodes are named according to the regulator type:
  buck_<name> and ldo_<name>.
  MT6351 regulators node should be sub node of the MT6397 MFD node.

properties:
  compatible:
    const: mediatek,mt6351-regulator

patternProperties:
  "^buck_v(core|gpu|modem|md1|sram_md|s1|s2|pa|sram_proc)$":
    type: object
    $ref: regulator.yaml#

    properties:
      regulator-name:
        pattern: "^v(core|gpu|modem|md1|sram_md|s1|s2|pa|sram_proc)$"

    unevaluatedProperties: false

  "^ldo_v(bif28|usb33|io18|ldo28|io28|ldo28_0|ldo28_1)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single fixed LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(bif28|usb33|io18|ldo28|io28|ldo28_0|ldo28_1)$"

    unevaluatedProperties: false

  "^ldo_v(cama|camd|camio)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(cama|camd|camio)$"

    unevaluatedProperties: false

  "^ldo_v(rf18|rf12|tcxo24|tcxo28|xo22)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(rf18|rf12|tcxo24|tcxo28|xo22)$"

    unevaluatedProperties: false

  "^ldo_v(sim1|sim2|cn18|cn28|cn33)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(sim1|sim2|cn18|cn28|cn33)$"

    unevaluatedProperties: false

  "^ldo_v(dram|emc-3v3|mipi|efuse)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(dram|emc_3v3|mipi|efuse)$"

    unevaluatedProperties: false

  "^ldo_v(io28|gp3|ibr)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(io28|gp3|ibr)$"

    unevaluatedProperties: false

  "^ldo_v(a10|a18|mch|mc)$":
    type: object
    $ref: regulator.yaml#
    description:
      Properties for single LDO regulator.

    properties:
      regulator-name:
        pattern: "^v(a10|a18|mch|mc)$"

    unevaluatedProperties: false

required:
  - compatible

additionalProperties: false

examples:
  - |
    pmic {
      regulators {
        mt6351_vcore_reg: buck_vcore {
          regulator-name = "buck_vcore";
          regulator-min-microvolt = <600000>;
          regulator-max-microvolt = <1393750>;
          regulator-ramp-delay = <6250>;
          regulator-enable-ramp-delay = <180>;
        };

        mt6351_vgpu_reg: buck_vgpu {
          regulator-name = "buck_vgpu";
          regulator-min-microvolt = <600000>;
          regulator-max-microvolt = <1393750>;
          regulator-ramp-delay = <6250>;
          regulator-enable-ramp-delay = <180>;
          regulator-always-on;
          regulator-boot-on;
        };

