%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/mediatek,mt6757-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MediaTek Functional Clock Controller for MT6757

maintainers:
  - Ben Grisdale <bengris32@protonmail.ch>

description: |
  The clock architecture in MediaTek like below
  PLLs -->
          dividers -->
                      muxes
                           -->
                              clock gate

  The devices provide clock gate control in different IP blocks.

properties:
  compatible:
    items:
      - enum:
        - mediatek,mt6757-camsys
        - mediatek,mt6757-imgsys
        - mediatek,mt6757-mfgcfg
        - mediatek,mt6757-vdecsys
        - mediatek,mt6757-vencsys
      - const: syscon

  reg:
    maxItems: 1

  '#clock-cells':
    const: 1

  '#reset-cells':
    const: 1
    description:
      Reset lines for MFGCFG and VDECSYS blocks

required:
  - compatible
  - reg
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    soc {
        #address-cells = <2>;
        #size-cells = <2>;

        camsys: clock-controller@1a000000 {
            compatible = "mediatek,mt6757-camsys", "syscon";
            reg = <0 0x1a000000 0 0x1000>;
            #clock-cells = <1>;
        };

        imgsys: clock-controller@15020000 {
            compatible = "mediatek,mt6757-imgsys", "syscon";
            reg = <0 0x15020000 0 0x1000>;
            #clock-cells = <1>;
        };

        mfgcfg: clock-controller@13000000 {
            compatible = "mediatek,mt6757-mfgcfg", "syscon";
            reg = <0 0x13000000 0 0x1000>;
            #clock-cells = <1>;
            #reset-cells = <1>;
        };

        vdecsys: clock-controller@16000000 {
            compatible = "mediatek,mt6757-vdecsys", "syscon";
            reg = <0 0x16000000 0 0x1000>;
            #clock-cells = <1>;
            #reset-cells = <1>;
        };

        vencsys: clock-controller@17000000 {
            compatible = "mediatek,mt6757-vencsys", "syscon";
            reg = <0 0x17000000 0 0x1000>;
            #clock-cells = <1>;
        };
    };
